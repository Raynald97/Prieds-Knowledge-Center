<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prieds Knowledge Center</title><style>
:root{
  --primary:#28B8E2;
  --primary-dark:#1598C0;
  --secondary:#9DE0F5;
  --secondary-soft:#EAF9FD;
  --ink:#263238;
  --muted:#65727A;
  --line:#D9E2E7;
  --surface:#FFFFFF;
  --canvas:#F7F9FA;
  --shadow:0 5px 16px rgba(28,67,83,.13);
  --radius:9px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--canvas);color:var(--ink);font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
button,input{font:inherit}button{cursor:pointer}button:disabled{cursor:not-allowed;opacity:.45}
.app{min-height:100vh;padding:24px 18px 60px}
.header{
  max-width:1160px;height:86px;margin:0 auto 28px;padding:0 30px;
  display:flex;align-items:center;gap:22px;background:linear-gradient(90deg,#E9F9FD,#DEF5FB);
  border:1px solid #D6EEF5;box-shadow:var(--shadow)
}
.brand{display:flex;align-items:center;gap:20px;min-width:0}
.wordmark{position:relative;font-size:42px;line-height:1;font-weight:900;letter-spacing:-3px;color:var(--primary)}
.wordmark:after{content:"Your Primary Needs";position:absolute;left:7px;bottom:-9px;font-size:7px;letter-spacing:1.5px;font-weight:700;color:#9BCEDC;white-space:nowrap}
.brandTitle{font-size:23px;font-weight:500;white-space:nowrap}
.headerTools{margin-left:auto;display:flex;align-items:center;gap:10px}
.lang{display:flex;background:#fff;border:1px solid #C9DCE3;border-radius:7px;padding:3px}
.lang button{border:0;background:transparent;color:#66757C;border-radius:5px;padding:7px 9px;font-size:12px;font-weight:800}
.lang button.active{background:var(--primary);color:#fff}
.loginBtn{border:0;border-radius:5px;background:var(--primary);color:#fff;padding:10px 17px;box-shadow:0 3px 7px rgba(17,154,195,.25)}
.loginBtn:hover{background:var(--primary-dark)}
.mobileMenu{display:none;border:1px solid #BBD8E1;background:#fff;width:40px;height:40px;border-radius:6px}
.workspace{max-width:1160px;margin:0 auto;display:grid;grid-template-columns:285px minmax(0,1fr);gap:34px;align-items:start}
.sidebar{position:sticky;top:18px;max-height:calc(100vh - 36px);overflow:auto;padding:0 10px 20px 0}
.sidebarTitle{font-size:15px;font-weight:500;margin:0 0 10px 2px;color:#334047}
.moduleGroup{margin:1px 0}
.moduleToggle{width:100%;border:0;background:transparent;display:flex;align-items:center;gap:8px;text-align:left;padding:9px 8px;color:#2F3A40;border-radius:5px;font-size:13px}
.moduleToggle:hover{background:#EDF7FA}
.moduleToggle .chev{width:14px;display:inline-block;transition:.18s;color:#40545D}
.moduleToggle .moduleName{flex:1}
.moduleGroup.open>.moduleToggle{color:#075D78;font-weight:700}
.moduleGroup.open>.moduleToggle .chev{transform:rotate(90deg)}
.topicLinks{display:none;padding:1px 0 6px 30px}
.moduleGroup.open .topicLinks{display:grid}
.topicLinks button{width:100%;border:0;background:transparent;text-align:left;padding:7px 8px;border-radius:4px;color:#27343A;font-size:12px;line-height:1.35}
.topicLinks button:hover{color:#0789B2;background:#EFF9FC}
.topicLinks button.active{background:var(--primary);color:#fff;font-weight:750}
.main{min-width:0}
.breadcrumb{font-size:12px;color:#95A0A5;margin:0 0 18px}
.breadcrumb button{border:0;background:transparent;color:#6D7A80;padding:0}
.searchBlock{text-align:center;margin:0 auto 26px}
.searchBlock h1{font-size:24px;font-weight:500;margin:0 0 18px;color:#303A3F}
.searchRow{display:flex;justify-content:center;gap:10px;max-width:560px;margin:auto}
.searchRow input{flex:1;min-width:0;height:37px;border:1px solid #9EA9AE;border-radius:5px;background:#fff;padding:0 12px;font-size:12px;outline:none}
.searchRow input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(40,184,226,.12)}
.searchBtn{border:0;background:var(--primary);color:#fff;border-radius:5px;padding:0 17px;font-size:12px;box-shadow:0 3px 7px rgba(17,154,195,.22)}
.searchBtn:hover{background:var(--primary-dark)}
.sectionBanner{display:flex;align-items:center;gap:12px;background:var(--primary);color:#fff;border-radius:5px;padding:11px 14px;margin-bottom:12px}
.bannerIcon{width:25px;height:25px;border-radius:4px;background:#fff;color:var(--primary);display:grid;place-items:center;font-weight:900}
.sectionBanner strong{display:block;font-size:14px}.sectionBanner small{display:block;font-size:10px;margin-top:2px}
.articleList{display:grid;gap:11px}
.articleCard{width:100%;display:grid;grid-template-columns:125px minmax(0,1fr) 30px;align-items:stretch;border:1px solid #77858B;border-radius:6px;background:#fff;padding:0;text-align:left;overflow:hidden;transition:.15s}
.articleCard:hover{border-color:var(--primary);box-shadow:0 6px 16px rgba(32,112,139,.10);transform:translateY(-1px)}
.cardThumb{min-height:104px;background:var(--secondary);display:grid;place-items:center;color:#fff;font-size:39px;font-weight:900}
.cardBody{padding:14px 12px}.cardBody h3{font-size:14px;font-weight:500;margin:0 0 4px;color:#263238}.cardMeta{font-size:10px;color:#4F5C62;margin-bottom:8px}.cardBody p{font-size:11px;line-height:1.45;color:#59666C;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cardArrow{display:grid;place-items:center;font-size:22px;color:#263238}
.empty{padding:35px;border:1px dashed #B9C5CA;background:#fff;text-align:center;color:#77858B;border-radius:7px}
.articleView{display:none}.articleView.show{display:block}.listView.hide{display:none}
.articleTopSearch{margin-bottom:24px}.articleTopSearch .searchBlock{margin-bottom:0}.articleTopSearch .searchBlock h1{font-size:22px}
.author{display:flex;align-items:center;gap:9px;font-size:10px;color:#5F6A70;margin:2px 0 17px}
.authorIcon{width:27px;height:27px;border-radius:50%;display:grid;place-items:center;background:#303A3F;color:#fff;font-size:13px}.author strong{color:#263238}.adminTag{color:#047E9F;background:#DFF6FC;border-radius:3px;padding:2px 6px;margin-left:4px}
.articleTitle{font-size:25px;font-weight:500;margin:0 0 20px;color:#28343A}
.articleIntro{font-size:13px;line-height:1.65;color:#4F5E65;margin:0 0 18px}
.docContent{max-width:760px}
.docContent h2{font-size:20px;font-weight:600;margin:28px 0 12px;scroll-margin-top:20px}
.docLabel{font-size:11px;font-weight:800;color:#0986AD;text-transform:uppercase;letter-spacing:.06em;margin:20px 0 8px}
.docP{font-size:13px;line-height:1.65;color:#3E4C52;margin:10px 0}
.stepCard{margin:18px 0 10px}
.stepNum{display:none}.stepText{font-size:13px;line-height:1.65;color:#3D4A50}
.mediaCard{margin:10px 0 18px;background:#fff;border:0;overflow:hidden}
.mediaCard button{display:block;width:100%;border:0;background:#fff;padding:0;cursor:zoom-in}
.mediaCard img{width:100%;height:auto;display:block;border:1px solid #E3E8EB}
.mediaCaption{font-size:10px;color:#7E8A90;padding:7px 2px}
.docTableWrap{overflow:auto;margin:14px 0 20px;border:1px solid #D5DEE2;background:#fff}
.docTable{border-collapse:collapse;width:100%;font-size:11px}.docTable td{border:1px solid #DCE4E7;padding:9px;vertical-align:top;line-height:1.45}.docTable tr:first-child{background:#DDF4FA;font-weight:800}
.articleActions{display:flex;gap:9px;margin:24px 0}.articleActions button{border:1px solid #B8C8CE;background:#fff;border-radius:5px;padding:8px 12px;font-size:11px}.articleActions .primary{background:var(--primary);border-color:var(--primary);color:#fff}
.resultsTitle{font-size:20px;margin:0 0 14px}.resultHint{font-size:12px;color:#6F7D83;margin-bottom:14px}
.mobileDrawer{display:none}.lightbox{position:fixed;inset:0;background:rgba(6,20,27,.92);z-index:300;display:none;align-items:center;justify-content:center;padding:24px}.lightbox.show{display:flex}.lightbox img{max-width:96vw;max-height:92vh;object-fit:contain;background:#fff}.lightbox .close{position:absolute;right:23px;top:18px;width:40px;height:40px;border:0;border-radius:50%;background:#fff;font-size:22px}
.toast{position:fixed;right:20px;bottom:20px;background:#263238;color:#fff;padding:11px 14px;border-radius:5px;font-size:11px;opacity:0;transform:translateY(10px);transition:.2s;z-index:400}.toast.show{opacity:1;transform:none}
.footer{max-width:1160px;margin:35px auto 0;border-top:1px solid #D9E2E7;padding:20px;text-align:center;color:#8A969B;font-size:10px}
@media(max-width:900px){.workspace{grid-template-columns:240px minmax(0,1fr);gap:22px}.header{padding:0 20px}.brandTitle{font-size:20px}.articleCard{grid-template-columns:95px minmax(0,1fr) 28px}}
@media(max-width:700px){.app{padding:0 0 40px}.header{margin:0 0 16px;max-width:none;height:72px;padding:0 14px}.wordmark{font-size:32px}.wordmark:after{display:none}.brandTitle{font-size:17px}.loginBtn{display:none}.mobileMenu{display:block;margin-left:auto}.workspace{display:block;padding:0 14px}.sidebar{display:none}.headerTools{margin-left:0}.mobileDrawer{position:fixed;inset:72px 0 0;background:#fff;z-index:200;padding:18px;overflow:auto}.mobileDrawer.show{display:block}.mobileDrawer .sidebar{display:block;position:static;max-height:none}.searchBlock h1{font-size:20px}.articleCard{grid-template-columns:76px minmax(0,1fr) 25px}.cardThumb{min-height:96px;font-size:30px}.docContent{max-width:none}.articleTitle{font-size:23px}}
</style></head><body>
<div class="app">
<header class="header">
  <div class="brand"><div class="wordmark">prieds</div><div class="brandTitle">Knowledge Center</div></div>
  <div class="headerTools">
    <div class="lang"><button class="active" data-lang="id">ID</button><button data-lang="en">EN</button></div>
    <button class="loginBtn" id="loginBtn">Admin Master</button>
  </div>
  <button class="mobileMenu" id="mobileMenu">☰</button>
</header>
<div class="workspace">
  <aside class="sidebar"><h2 class="sidebarTitle" data-ui="tocTitle"></h2><div id="leftNav"></div></aside>
  <main class="main">
    <div class="breadcrumb" id="breadcrumb"></div>
    <section class="listView" id="listView">
      <div class="searchBlock"><h1 data-ui="findTitle"></h1><div class="searchRow"><input id="searchInput"><button class="searchBtn" id="searchBtn" data-ui="search"></button></div></div>
      <div id="listHeader"></div><div class="articleList" id="articleList"></div>
    </section>
    <section class="articleView" id="articleView">
      <div class="articleTopSearch"><div class="searchBlock"><h1 data-ui="findTitle"></h1><div class="searchRow"><input id="articleSearchInput"><button class="searchBtn" id="articleSearchBtn" data-ui="search"></button></div></div></div>
      <div class="author"><div class="authorIcon">●</div><div><strong>Prieds Learning Center</strong><span class="adminTag">Admin</span><br><span id="articleSource"></span></div></div>
      <h1 class="articleTitle" id="articleTitle"></h1><p class="articleIntro" id="articleIntro"></p><div class="docContent" id="docContent"></div>
      <div class="articleActions"><button id="backBtn" data-ui="back"></button><button class="primary" id="copyBtn" data-ui="copy"></button></div>
    </section>
  </main>
</div>
<div class="footer" data-ui="footer"></div>
</div>
<div class="mobileDrawer" id="mobileDrawer"><aside class="sidebar"><h2 class="sidebarTitle" data-ui="tocTitle"></h2><div id="mobileNav"></div></aside></div>
<div class="lightbox" id="lightbox"><button class="close" id="lightboxClose">×</button><img id="lightboxImg"></div><div class="toast" id="toast"></div>
<script src="knowledge-data.js"></script><script src="knowledge-store.js"></script><script type="module">const __kcState=await window.KCStore.load(window.KC_DEFAULT_DATA);
let DATA=__kcState.data;
let ASSETS={...window.KC_DEFAULT_ASSETS,...(__kcState.assets||{})};
const UI={
 id:{tocTitle:'Table of Content',findTitle:'Temukan artikel sesuai kebutuhan Anda',search:'Search',back:'Kembali ke daftar artikel',copy:'Salin panduan',footer:'Prieds Knowledge Center • Panduan resmi WMS Lite dan WMS Lite RFID',placeholder:'Contoh: Product Management',articles:'Artikel dalam menu ini',created:'Diperbarui dari User Guide • Editor: Prieds Learning Center',empty:'Tidak ada artikel yang sesuai.',results:'Hasil pencarian',home:'Knowledge Center',copied:'Panduan berhasil disalin.',login:'Fitur login dapat dihubungkan pada environment production.'},
 en:{tocTitle:'Table of Content',findTitle:'Find articles according to your needs',search:'Search',back:'Back to article list',copy:'Copy guide',footer:'Prieds Knowledge Center • Official WMS Lite and WMS Lite RFID guides',placeholder:'Example: Product Management',articles:'Articles in this menu',created:'Updated from User Guide • Editor: Prieds Learning Center',empty:'No matching articles were found.',results:'Search results',home:'Knowledge Center',copied:'Guide copied successfully.',login:'Login can be connected in the production environment.'}
};
let lang='id';
let activeModule=DATA.find(m=>m.id==='master')||DATA[0];
let activeTopic=0;
let lastListMode={type:'module',module:activeModule,items:activeModule.topics.map((x,i)=>({m:activeModule,x,i}))};
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const t=k=>UI[lang][k]||k;
const topicMeta=topic=>({createdAt:topic.createdAt||'2026-07-20T03:00:00.000Z',updatedAt:topic.updatedAt||topic.createdAt||'2026-07-20T03:00:00.000Z',editor:topic.editor||'Prieds Learning Center'});
const fmtDate=v=>{try{return new Intl.DateTimeFormat(lang==='id'?'id-ID':'en-GB',{dateStyle:'medium',timeStyle:'short'}).format(new Date(v))}catch(_){return v||'-'}};
function getBlocks(topic){return topic.blocks[lang]&&topic.blocks[lang].length?topic.blocks[lang]:topic.blocks.id||[]}
function preview(topic){const b=getBlocks(topic).find(b=>['p','step'].includes(b.type)&&b.text&&b.text.length>28);return b?b.text:(lang==='id'?'Panduan penggunaan menu Prieds berdasarkan User Guide.':'Prieds menu guide based on the User Guide.')}
function toastMsg(msg){$('toast').textContent=msg;$('toast').classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>$('toast').classList.remove('show'),1800)}
function localize(){document.documentElement.lang=lang;document.querySelectorAll('[data-ui]').forEach(el=>el.textContent=t(el.dataset.ui));$('searchInput').placeholder=t('placeholder');$('articleSearchInput').placeholder=t('placeholder');renderNav();if($('articleView').classList.contains('show'))renderArticle();else rerenderLastList()}
function navHtml(){return DATA.map(m=>`<div class="moduleGroup ${m.id===activeModule.id?'open':''}" data-group="${m.id}"><button class="moduleToggle" data-module="${m.id}"><span class="chev">›</span><span class="moduleName">${esc(m.name[lang])}</span></button><div class="topicLinks">${m.topics.map((x,i)=>`<button class="${m.id===activeModule.id&&i===activeTopic&&$('articleView').classList.contains('show')?'active':''}" data-topic-module="${m.id}" data-topic-index="${i}">${esc(x.title[lang])}</button>`).join('')}</div></div>`).join('')}
function bindNav(root){root.querySelectorAll('[data-module]').forEach(btn=>btn.onclick=()=>{const m=DATA.find(x=>x.id===btn.dataset.module);if(!m)return;activeModule=m;activeTopic=0;showModuleList(m);$('mobileDrawer').classList.remove('show')});root.querySelectorAll('[data-topic-module]').forEach(btn=>btn.onclick=()=>{openArticle(btn.dataset.topicModule,+btn.dataset.topicIndex);$('mobileDrawer').classList.remove('show')})}
function renderNav(){$('leftNav').innerHTML=navHtml();$('mobileNav').innerHTML=navHtml();bindNav($('leftNav'));bindNav($('mobileNav'))}
function showList(){ $('listView').classList.remove('hide');$('articleView').classList.remove('show');window.scrollTo({top:0,behavior:'smooth'}) }
function showArticle(){ $('listView').classList.add('hide');$('articleView').classList.add('show');window.scrollTo({top:0,behavior:'smooth'}) }
function articleCard(r){const meta=topicMeta(r.x);return `<button class="articleCard" data-open-module="${r.m.id}" data-open-index="${r.i}"><div class="cardThumb">◖</div><div class="cardBody"><h3>${esc(r.x.title[lang])}</h3><div class="cardMeta">${esc(meta.editor)} • ${fmtDate(meta.updatedAt)}</div><p>${esc(preview(r.x))}</p></div><div class="cardArrow">›</div></button>`}
function bindCards(){$('articleList').querySelectorAll('[data-open-module]').forEach(btn=>btn.onclick=()=>openArticle(btn.dataset.openModule,+btn.dataset.openIndex))}
function showModuleList(m){activeModule=m;activeTopic=0;lastListMode={type:'module',module:m,items:m.topics.map((x,i)=>({m,x,i}))};showList();renderNav();renderModuleList(m);history.replaceState(null,'','#'+m.id)}
function renderModuleList(m){$('breadcrumb').innerHTML=`${t('home')} / ${esc(m.name[lang])}`;$('listHeader').innerHTML=`<div class="sectionBanner"><div class="bannerIcon">▣</div><div><strong>${esc(m.name[lang])}</strong><small>${m.topics.length} ${t('articles')}</small></div></div>`;$('articleList').innerHTML=m.topics.length?m.topics.map((x,i)=>articleCard({m,x,i})).join(''):`<div class="empty">${t('empty')}</div>`;bindCards()}
function searchArticles(q){q=q.trim();if(!q){showModuleList(activeModule);return}const nq=normalize(q),items=[];DATA.forEach(m=>m.topics.forEach((x,i)=>{const blocks=getBlocks(x);const hay=[m.name[lang],m.desc[lang],x.title[lang],...blocks.filter(b=>b.text).map(b=>b.text)].join(' ');if(normalize(hay).includes(nq))items.push({m,x,i})}));lastListMode={type:'search',query:q,items};showList();$('breadcrumb').innerHTML=`${t('home')} / ${t('results')}`;$('listHeader').innerHTML=`<div class="sectionBanner"><div class="bannerIcon">⌕</div><div><strong>${t('results')}</strong><small>${items.length} ${t('articles')} • “${esc(q)}”</small></div></div>`;$('articleList').innerHTML=items.length?items.map(articleCard).join(''):`<div class="empty">${t('empty')}</div>`;bindCards()}
function rerenderLastList(){if(lastListMode.type==='search')searchArticles(lastListMode.query);else renderModuleList(lastListMode.module||activeModule)}
function normalize(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ')}
function openArticle(mid,idx){activeModule=DATA.find(m=>m.id===mid)||DATA[0];activeTopic=Math.max(0,Math.min(idx,activeModule.topics.length-1));showArticle();renderNav();renderArticle();history.replaceState(null,'','#'+mid+'-'+activeTopic)}
function renderArticle(){const topic=activeModule.topics[activeTopic],blocks=getBlocks(topic);$('breadcrumb').innerHTML=`<button id="crumbHome">${t('home')}</button> / <button id="crumbModule">${esc(activeModule.name[lang])}</button> / ${esc(topic.title[lang])}`;$('crumbHome').onclick=()=>showModuleList(activeModule);$('crumbModule').onclick=()=>showModuleList(activeModule);$('articleTitle').textContent=topic.title[lang];{const meta=topicMeta(topic);$('articleSource').textContent=(topic.source||'Prieds')+' • '+meta.editor+' • '+fmtDate(meta.updatedAt);}$('articleIntro').textContent=preview(topic);let step=0,html='';blocks.forEach(b=>{if(b.type==='label')html+=`<div class="docLabel">${esc(b.text)}</div>`;else if(b.type==='subheading')html+=`<h2>${esc(b.text)}</h2>`;else if(b.type==='step')html+=`<div class="stepCard"><div class="stepNum">${++step}</div><div class="stepText">${esc(b.text)}</div></div>`;else if(b.type==='p')html+=`<p class="docP">${esc(b.text)}</p>`;else if(b.type==='image'){const src=ASSETS[b.asset];if(src)html+=`<figure class="mediaCard"><button data-asset="${b.asset}"><img loading="lazy" src="${src}" alt="${esc(b.caption||topic.title[lang])}"></button>${b.caption?`<figcaption class="mediaCaption">${esc(b.caption)}</figcaption>`:''}</figure>`}else if(b.type==='table')html+=`<div class="docTableWrap"><table class="docTable">${b.rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</table></div>`});$('docContent').innerHTML=html||`<div class="empty">${t('empty')}</div>`;$('docContent').querySelectorAll('[data-asset]').forEach(btn=>btn.onclick=()=>openLightbox(ASSETS[btn.dataset.asset]))}
function openLightbox(src){$('lightboxImg').src=src;$('lightbox').classList.add('show')}
function copyGuide(){const topic=activeModule.topics[activeTopic],blocks=getBlocks(topic);const text=[topic.title[lang],...blocks.filter(b=>b.text).map(b=>b.text)].join('\n');navigator.clipboard.writeText(text).then(()=>toastMsg(t('copied')))}
function syncSearch(source,target){target.value=source.value;searchArticles(source.value)}
document.querySelectorAll('[data-lang]').forEach(btn=>btn.onclick=()=>{lang=btn.dataset.lang;document.querySelectorAll('[data-lang]').forEach(x=>x.classList.toggle('active',x===btn));localize()});
$('searchInput').oninput=e=>searchArticles(e.target.value);$('searchBtn').onclick=()=>searchArticles($('searchInput').value);$('searchInput').onkeydown=e=>{if(e.key==='Enter')searchArticles(e.target.value)};
$('articleSearchInput').oninput=e=>{$('searchInput').value=e.target.value;searchArticles(e.target.value)};$('articleSearchBtn').onclick=()=>{$('searchInput').value=$('articleSearchInput').value;searchArticles($('articleSearchInput').value)};
$('backBtn').onclick=()=>{showList();rerenderLastList();renderNav()};$('copyBtn').onclick=copyGuide;$('loginBtn').onclick=()=>{location.href='master.html'};
$('mobileMenu').onclick=()=>{$('mobileDrawer').classList.toggle('show');renderNav()};$('lightboxClose').onclick=()=>$('lightbox').classList.remove('show');$('lightbox').onclick=e=>{if(e.target===$('lightbox'))$('lightbox').classList.remove('show')};document.addEventListener('keydown',e=>{if(e.key==='Escape'){$('lightbox').classList.remove('show');$('mobileDrawer').classList.remove('show')}});
window.KCStore.subscribe(()=>location.reload());
localize();renderNav();const hash=location.hash.match(/^#([a-z]+)(?:-(\d+))?$/);if(hash){const m=DATA.find(x=>x.id===hash[1]);if(m){if(hash[2]!=null)openArticle(m.id,+hash[2]);else showModuleList(m)}}else showModuleList(activeModule);
</script></body></html>
